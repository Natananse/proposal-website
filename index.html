<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Marry Me Hiwetae?</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="card">

    <!-- Wedding rings emblem -->
    <div class="rings" aria-hidden="true">
      <svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="38" cy="32" r="18" fill="none" stroke="currentColor" stroke-width="3.5"/>
        <circle cx="62" cy="32" r="18" fill="none" stroke="currentColor" stroke-width="3.5"/>
        <!-- small sparkle above the overlap -->
        <path d="M50 8 l1.8 4.2 4.2 1.8 -4.2 1.8 -1.8 4.2 -1.8 -4.2 -4.2 -1.8 4.2 -1.8 Z" fill="currentColor"/>
      </svg>
    </div>

    <div class="eyebrow" id="eyebrow">a question, whenever you're ready</div>

    <!-- Question view -->
    <div id="questionView">
      <h1 id="typedText"><span class="cursor">&nbsp;</span></h1>
      <div class="btn-row">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
      </div>
    </div>

    <!-- Celebration view (hidden until Yes is clicked) -->
    <div id="celebrateView" class="celebrate">
      <h1>She said yes. 💛</h1>
      <p>(the "no" button never stood a chance)</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
